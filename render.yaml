services:
  # 1. Backend Express API Server (Web Service)
  - type: web
    name: agriassist-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false

  # 2. Frontend React Client (Static Site)
  - type: static
    name: agriassist-frontend
    buildCommand: npm run build
    staticPublishPath: ./dist
    routes:
      # Proxy /api/* to the backend service. 
      # NOTE: If your backend URL on Render is different, update this URL.
      - type: rewrite
        source: /api/*
        destination: https://agriassist-backend.onrender.com/api/*
      # SPA fallback routing
      - type: rewrite
        source: /*
        destination: /index.html
